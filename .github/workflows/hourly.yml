name: run-hourly

on:
  schedule:
    # Hourly windows (your local time mapping)
    - cron: "0 13-21 * 3-10 *"
    - cron: "0 14-22 * 11,12,1,2 *"
    # 12:00 AM local
    - cron: "0 4 * 3-10 *"     # 00:00 EDT = 04:00 UTC
    - cron: "0 5 * 11,12,1,2 *" # 00:00 EST = 05:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      # --- Login and fetch cookie ---
      - name: Get Forsta cookie
        id: cookie
        env:
          FORSTA_USER: ${{ secrets.FORSTA_USER }}
          FORSTA_PASS: ${{ secrets.FORSTA_PASS }}
          FORSTA_LOGIN_URL: ${{ secrets.FORSTA_LOGIN_URL }} # optional override
        run: python fetch_forsta_cookie.py

      # Optional: keep a copy as an artifact for debugging
      - name: Upload cookie artifact (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forsta-cookie
          path: forsta_cookie.txt
          retention-days: 1

      # --- Run BNPA script (no extra job nesting) ---
      - name: Run BNPA
        env:
          OAUTH_CLIENT_ID:      ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET:  ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_REFRESH_TOKEN:  ${{ secrets.OAUTH_REFRESH_TOKEN }}
          FORSTA_COOKIE:        ${{ secrets.FORSTA_COOKIE }} # still manual for now
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_URL: ${{ secrets.SHEET_URL }}
          TAB_NAME: "Test"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python BNPA.py
