name: run-hourly

on:
    schedule:
    # March–October (EDT = UTC-4)
    - cron: "0 12 * 3-10 *"  # 08:00 EDT
    - cron: "0 16 * 3-10 *"  # 12:00 EDT
    - cron: "0 20 * 3-10 *"  # 16:00 EDT
    # November–February (EST = UTC-5)
    - cron: "0 13 * 11,12,1,2 *"  # 08:00 EST
    - cron: "0 17 * 11,12,1,2 *"  # 12:00 EST
    - cron: "0 21 * 11,12,1,2 *"  # 16:00 EST
  workflow_dispatch:

# Prevent overlapping runs from racing on the sheet
concurrency:
  group: forsta-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.56.0-noble
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install Python deps
        run: uv pip install --system --break-system-packages -r requirements.txt

      - name: Get Forsta cookie
        id: cookie
        env:
          FORSTA_USER:       ${{ secrets.FORSTA_USER }}
          FORSTA_PASS:       ${{ secrets.FORSTA_PASS }}
          FORSTA_LOGIN_URL:  ${{ secrets.FORSTA_LOGIN_URL }}
        run: python3 fetch_forsta_cookie.py

      - name: Run BNPA
        env:
          FORSTA_API_KEY:              ${{ secrets.FORSTA_API_KEY }}
          OAUTH_CLIENT_ID:             ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET:         ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_REFRESH_TOKEN:         ${{ secrets.OAUTH_REFRESH_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_URL:                   ${{ secrets.SHEET_URL }}
          FORSTA_COOKIE_B64:           ${{ steps.cookie.outputs.FORSTA_COOKIE_B64 }}
        run: |
          if [ -n "${FORSTA_COOKIE_B64:-}" ]; then
            export FORSTA_COOKIE="$(printf %s "$FORSTA_COOKIE_B64" | base64 -d)"
          fi
          python3 BNPA.py
