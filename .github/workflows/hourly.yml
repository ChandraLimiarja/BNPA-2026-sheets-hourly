name: run-hourly

on:
  schedule:
    # March–October (EDT = UTC-4)
    - cron: "0 11 * 3-10 *"
    - cron: "0 13 * 3-10 *"
    - cron: "0 16 * 3-10 *"
    - cron: "0 19 * 3-10 *"
    - cron: "0 21 * 3-10 *"
    # November–February (EST = UTC-5)
    - cron: "0 12 * 11,12,1,2 *"
    - cron: "0 14 * 11,12,1,2 *"
    - cron: "0 17 * 11,12,1,2 *"
    - cron: "0 20 * 11,12,1,2 *"
    - cron: "0 22 * 11,12,1,2 *"
  workflow_dispatch:

# Prevent overlapping runs from racing on the sheet
concurrency:
  group: forsta-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.56.0-noble
    env:
      USE_FETCHED_COOKIE: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install uv
        run: pip install uv

      - name: Install Python deps (uv)
        run: uv pip install --system -r requirements.txt

      - name: Get Forsta cookie
        id: cookie
        env:
          FORSTA_USER: ${{ secrets.FORSTA_USER }}
          FORSTA_PASS: ${{ secrets.FORSTA_PASS }}
          FORSTA_LOGIN_URL: ${{ secrets.FORSTA_LOGIN_URL }}
        run: python fetch_forsta_cookie.py

      - name: Run BNPA
        env:
          FORSTA_API_KEY:              ${{ secrets.FORSTA_API_KEY }}
          OAUTH_CLIENT_ID:             ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET:         ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_REFRESH_TOKEN:         ${{ secrets.OAUTH_REFRESH_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_URL:                   ${{ secrets.SHEET_URL }}
          FORSTA_COOKIE_B64:           ${{ steps.cookie.outputs.FORSTA_COOKIE_B64 }}
        run: |
          if [ -n "${FORSTA_COOKIE_B64:-}" ]; then
            export FORSTA_COOKIE="$(printf %s "$FORSTA_COOKIE_B64" | base64 -d)"
          fi
          python BNPA.py
